# Vridik — CI (Sprint S3)
# Dos jobs independientes:
#   1. test          -> py_compile + pytest -q sobre PostgreSQL real (service container),
#                        fail-fast si menos del 90% de los tests pasan (scripts/check_pass_ratio.py).
#   2. validate-sql  -> valida la sintaxis/lógica de los .sql de Vridik/JuliX contra un
#                        PostgreSQL efímero. psql no tiene un flag --dry-run nativo; el
#                        "dry-run" aquí es aplicar los scripts en un contenedor de servicio
#                        que se destruye al terminar el job — nunca toca Railway ni staging.
name: Vridik CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"

jobs:
  test:
    name: Tests (py_compile + pytest, PostgreSQL real)
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: vridik
          POSTGRES_PASSWORD: ${{ secrets.CI_TEST_DB_PASSWORD }}
          POSTGRES_DB: vridik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vridik -d vridik_test"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      TEST_DATABASE_URL: postgresql://vridik:${{ secrets.CI_TEST_DB_PASSWORD }}@localhost:5432/vridik_test
      DATABASE_URL: postgresql://vridik:${{ secrets.CI_TEST_DB_PASSWORD }}@localhost:5432/vridik_test
      JWT_SECRET: ci-test-secret-nunca-produccion
      ANTHROPIC_API_KEY_STAGING: ci-fake-key-staging
      ANTHROPIC_API_KEY_PROD: ci-fake-key-prod

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configurar Python ${{ env.PYTHON_VERSION }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip

      - name: Instalar dependencias
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-test.txt

      - name: py_compile — todo el código Python debe compilar
        run: |
          find . -path ./.git -prune -o -name "*.py" -print | xargs -r python -m py_compile

      - name: ruff (lint)
        run: ruff check . --output-format=github
        continue-on-error: true # el gate real de esta corrida es el ratio de tests (ver más abajo); ruff bloquea aparte en S3 ("romper CI a propósito una vez")

      - name: Instalar cliente psql
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Hardening RLS -- crear rol de aplicación sin privilegios especiales y reapuntar DATABASE_URL ANTES de aplicar schema/seed
        # POSTGRES_USER=vridik hace que la imagen oficial de postgres lo cree
        # como el bootstrap superuser (initdb lo usa para bootstrapear el
        # cluster). Hasta PG15 se podía crear todo con vridik y después
        # hacer ALTER ROLE vridik NOSUPERUSER sobre sí mismo; en PG18 eso da
        # "permission denied to alter role / DETAIL: The bootstrap superuser
        # must have the SUPERUSER attribute" (protección nueva). Se probó
        # también degradar vía REASSIGN OWNED BY vridik TO vridik_app
        # DESPUÉS de aplicar schema/seed -- tampoco funciona en PG18: "cannot
        # reassign ownership of objects owned by role vridik because they
        # are required by the database system" (mismo tipo de protección
        # sobre el bootstrap superuser). Fix real: crear vridik_app ANTES de
        # aplicar schema/seed, y que sea vridik_app quien los aplique --
        # así es DUEÑO de todo lo que crea desde el principio (mismo patrón
        # que ya usa producción real: vridik-api se conecta como el rol
        # `vridik_app`, dueño de sus propias tablas, no como el superusuario
        # del servicio Postgres de Railway, ver TF1 en
        # HANDOFF_CLAUDE_CODE.md). El GRANT sobre el SCHEMA (no solo sobre
        # tablas) es necesario porque, desde PG15, CREATE en `public` ya no
        # se otorga por defecto a roles que no son el dueño del schema --
        # pgcrypto/citext son extensiones "trusted" desde PG13, así que
        # vridik_app puede instalarlas sin ser superusuario, solo con CREATE
        # en el schema. El SELECT final es puro diagnóstico.
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "CREATE ROLE vridik_app WITH LOGIN PASSWORD '${{ secrets.CI_TEST_DB_PASSWORD }}' NOSUPERUSER NOBYPASSRLS;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "GRANT ALL PRIVILEGES ON DATABASE vridik_test TO vridik_app;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "GRANT ALL PRIVILEGES ON SCHEMA public TO vridik_app;"
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -c "SELECT rolname, rolsuper, rolbypassrls FROM pg_roles WHERE rolname = 'vridik_app';"
          echo "TEST_DATABASE_URL=postgresql://vridik_app:${{ secrets.CI_TEST_DB_PASSWORD }}@localhost:5432/vridik_test" >> "$GITHUB_ENV"
          echo "DATABASE_URL=postgresql://vridik_app:${{ secrets.CI_TEST_DB_PASSWORD }}@localhost:5432/vridik_test" >> "$GITHUB_ENV"

      - name: Aplicar esquema base de Vridik (S1) en PostgreSQL del service container
        # A partir de acá $DATABASE_URL ya es vridik_app (reapuntado arriba
        # vía GITHUB_ENV) -- vridik_app crea y por lo tanto es DUEÑO de
        # todas estas tablas, sin necesitar REASSIGN OWNED después.
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f schema_semana1_vridik.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f julix/sql/ledger_schema.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/003_pdf_jobs.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/004_totp_2fa.sql

      - name: Cargar seed de staging (db/seed_railway.sql)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed_railway.sql

      - name: pytest -q (JUnit XML para el gate de 90%, cobertura para el gate de 60%)
        run: |
          mkdir -p reports
          pytest -q --junitxml=reports/junit.xml --cov=. --cov-report=term-missing
        continue-on-error: true # no se detiene aquí: los gates de abajo deciden si el job falla

      - name: Gate — fail fast si menos del 90% de los tests pasan
        run: python scripts/check_pass_ratio.py --junit-xml reports/junit.xml --threshold 0.90

      - name: Gate — fail fast si la cobertura real cae debajo de 60% (S3-GAP-01)
        run: coverage report --fail-under=60

      - name: Publicar reporte de tests
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-report
          path: reports/junit.xml

  validate-sql:
    name: Validar SQL (dry-run sobre PostgreSQL efímero)
    runs-on: ubuntu-latest

    services:
      postgres:
        # pgvector/pgvector:pg18 (no postgres:18 puro) -- rag_chunks_schema.sql
        # hace CREATE EXTENSION "vector", que la imagen oficial de Postgres no
        # trae instalada. Es un superset compatible de postgres:18 (mismo
        # entrypoint/health-check), así que no cambia nada del resto de este job.
        # pg18 para dejar de divergir de la versión real de producción (causa
        # raíz del 500 de TF2 en health_score.py, encontrado el 21-jul-2026).
        image: pgvector/pgvector:pg18
        env:
          POSTGRES_USER: vridik
          POSTGRES_PASSWORD: ${{ secrets.CI_TEST_DB_PASSWORD }}
          POSTGRES_DB: vridik_sql_dryrun
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U vridik -d vridik_sql_dryrun"
          --health-interval=5s
          --health-timeout=5s
          --health-retries=10

    env:
      DATABASE_URL: postgresql://vridik:${{ secrets.CI_TEST_DB_PASSWORD }}@localhost:5432/vridik_sql_dryrun

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar cliente psql
        run: sudo apt-get update -y && sudo apt-get install -y postgresql-client

      - name: Dry-run — schema_semana1_vridik.sql
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f schema_semana1_vridik.sql

      - name: Dry-run — julix/sql/ledger_schema.sql
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f julix/sql/ledger_schema.sql

      - name: Dry-run — migrations/003_pdf_jobs.sql (S10/S11-extra, tabla pdf_jobs)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/003_pdf_jobs.sql

      - name: Dry-run — migrations/004_totp_2fa.sql (S12, columnas 2FA en users)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/004_totp_2fa.sql

      - name: Dry-run — db/seed_railway.sql
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed_railway.sql

      - name: Dry-run — rag/sql/rag_chunks_schema.sql (S6/S7, RAG legal -- nunca antes validado en CI)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f rag/sql/rag_chunks_schema.sql

      - name: Dry-run — rag/sql/002_rag_chunks_metadata.sql (S7, migración aditiva idempotente)
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f rag/sql/002_rag_chunks_metadata.sql

      - name: Verificación de idempotencia — reaplicar seed_railway.sql no debe fallar
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f db/seed_railway.sql

      - name: Verificación de idempotencia — reaplicar 003/004 no debe fallar
        run: |
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/003_pdf_jobs.sql
          psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f migrations/004_totp_2fa.sql

      - name: Verificación de idempotencia — reaplicar 002_rag_chunks_metadata.sql no debe fallar
        # rag_chunks_schema.sql en sí NO es idempotente (CREATE TABLE sin
        # IF NOT EXISTS, a propósito -- es el schema base, se aplica una sola
        # vez) -- reaplicarlo fallaría con "ya existe". 002 sí lo es (mismo
        # patrón que 003/004), es el que se reaplica en producción sin romper
        # cada vez que corre scripts/railway_setup_rag.sh.
        run: psql "$DATABASE_URL" -v ON_ERROR_STOP=1 -f rag/sql/002_rag_chunks_metadata.sql

      - name: Nota
        run: |
          echo "El contenedor postgres de este job se destruye al terminar (GitHub Actions"
          echo "no persiste services entre jobs/runs) — equivalente a un dry-run real:"
          echo "nada de esto toca Railway ni ninguna base de datos de staging/producción."
